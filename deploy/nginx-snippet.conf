# =====================================================================
# Добавить ВНУТРЬ существующего server { } блока staging.marketradar24.ru
# (рядом с location / { proxy_pass http://localhost:3000; })
# =====================================================================

# Call-Agent — путь /call-agent/* проксируется на отдельный Next.js (порт 3001)
location /call-agent/ {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    # mp3-плеер и большие транскрипты — увеличим таймауты и размер
    proxy_read_timeout 300;
    proxy_send_timeout 300;
    client_max_body_size 25M;
}

# (опционально) явный exact-match чтобы /call-agent без слеша редиректил на /call-agent/
location = /call-agent {
    return 301 /call-agent/;
}
